{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/build-allocation.css') }}">

<div class="container">
    <h1 class="title mb-4">Build Your Portfolio</h1>

    <!-- Main content area with two columns -->
    <div class="row">
        <!-- Left column - Portfolio Builder -->
        <div class="col-md-8">
            <div class="card portfolio-builder">
                <div class="card-header">
                    <h2 class="card-title">Portfolio Builder</h2>
                </div>
                <div class="card-body">
                    <!-- Portfolio Name Input -->
                    <div class="mb-4">
                        <label class="form-label">Portfolio Name</label>
                        <input type="text" class="form-control" id="portfolio-name" placeholder="Enter portfolio name">
                    </div>

                    <!-- Asset Categories Section -->
                    <div class="asset-categories">
                        <h3 class="section-title">Asset Categories</h3>
                        <div class="categories-container" id="categories-container">
                            <!-- Categories will be added here dynamically -->
                        </div>
                        <button class="btn btn-primary mt-3" id="add-category">
                            <i class="fas fa-plus me-2"></i>Add Category
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right column - Preview and Actions -->
        <div class="col-md-4">
            <!-- Preview Card -->
            <div class="card preview-card mb-4">
                <div class="card-header">
                    <h2 class="card-title">Preview</h2>
                </div>
                <div class="card-body">
                    <div id="preview-container">
                        <!-- Preview content will be rendered here -->
                        <div class="empty-preview">
                            <i class="fas fa-chart-pie"></i>
                            <p>Add categories to see preview</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Actions Card -->
            <div class="card actions-card">
                <div class="card-body">
                    <button class="btn btn-primary w-100 mb-3" id="save-portfolio">
                        <i class="fas fa-save me-2"></i>Save Portfolio
                    </button>
                    <button class="btn btn-outline-secondary w-100" id="reset-portfolio">
                        <i class="fas fa-undo me-2"></i>Reset
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Include necessary JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/build-allocation.js') }}"></script>
{% endblock %}
