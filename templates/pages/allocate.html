{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/allocate.css') }}">

<div class="container">
    <h1 class="title mb-4">Portfolio Allocation</h1>

    <!-- Combined header with tabs -->
    <div class="header-content d-flex flex-wrap justify-content-between align-items-center mb-4">
        <ul class="nav nav-tabs" id="allocationTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="global-tab" type="button" role="tab">
                    <i class="fas fa-globe me-2"></i>Global Overview
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="detailed-tab" type="button" role="tab">
                    <i class="fas fa-chart-pie me-2"></i>Detailed Overview
                </button>
            </li>
        </ul>
    </div>

    <!-- Tab Content -->
    <div class="tab-content" id="allocationTabsContent">
        <!-- Global Overview Tab -->
        <div class="tab-pane active" id="global" role="tabpanel">
            <!-- Investment Input in Global Overview -->
            <div class="investment-input mb-4">
                <label class="form-label">Investment Amount:</label>
                <div class="input-group">
                    <span class="input-group-text">€</span>
                    <input type="text" class="form-control" id="investment-amount" placeholder="Enter amount">
                </div>
            </div>

            <div class="portfolio-table-container">
                <div id="portfolio-table-container">
                    <!-- Table will be rendered here -->
                    <div class="d-flex justify-content-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Detailed Overview Tab -->
        <div class="tab-pane" id="detailed" role="tabpanel">
            <!-- Portfolio Selection Dropdown -->
            <div class="portfolio-select mb-4">
                <label class="form-label">Select Portfolio:</label>
                <select class="form-select" id="portfolio-select">
                    <!-- Options will be populated dynamically -->
                </select>
            </div>

            <!-- Rebalancing Actions Section -->
            <div class="rebalancing-actions">
                <p class="text-muted mb-3">
                    <i class="fas fa-info-circle me-1"></i> Click on a category to expand/collapse its positions.
                    Missing positions are highlighted in yellow.
                </p>
                
                <!-- Single portfolio table will be rendered here -->
                <div id="detailed-portfolio-container">
                    <div class="d-flex justify-content-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Include necessary JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/allocate.js') }}"></script>
{% endblock %}
