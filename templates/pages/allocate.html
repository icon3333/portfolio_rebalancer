{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/allocate.css') }}">

<div class="container">
    <h1 class="title">Portfolio Allocation</h1>

    <!-- Combined header with tabs and investment input -->
    <div class="header-content">
        <ul class="nav nav-tabs" id="allocationTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="global-tab" type="button" role="tab">
                    <i class="fas fa-globe me-2"></i>Global Overview
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="detailed-tab" type="button" role="tab">
                    <i class="fas fa-chart-pie me-2"></i>Detailed Overview
                </button>
            </li>
        </ul>

        <div class="investment-input">
            <label>How much do you want to invest?</label>
            <div class="input-group">
                <span class="input-group-text">€</span>
                <input type="text" class="form-control" id="investment-amount" placeholder="Enter amount">
            </div>
        </div>
    </div>

    <!-- Tab Content -->
    <div class="tab-content" id="allocationTabsContent">
        <!-- Global Overview Tab -->
        <div class="tab-pane active" id="global" role="tabpanel">
            <div id="portfolio-table-container">
                <!-- Table will be rendered here -->
                <div class="d-flex justify-content-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Detailed Overview Tab -->
        <div class="tab-pane" id="detailed" role="tabpanel">
            <div id="detailedChart" style="height: 400px;">
                <!-- Chart will be rendered here -->
            </div>
            
            <!-- Categories & Positions Tables -->
            <div id="detailed-tables-container">
                <!-- Detailed tables will be rendered here -->
            </div>
        </div>
    </div>
</div>

<!-- Include necessary JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/allocate.js') }}"></script>
{% endblock %}
