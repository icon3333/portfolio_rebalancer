<aside class="menu p-4 has-background-light" style="height: 100%; min-height: calc(100vh - 3.25rem);">
    {% if session.account_id %}
    <p class="menu-label">
        Portfolios
    </p>
    <ul class="menu-list">
        <li>
            <a href="{{ url_for('portfolio.enrich') }}" class="{{ 'is-active' if request.endpoint == 'portfolio.enrich' }}">
                <span class="icon-text">
                    <span class="icon">
                        <i class="fas fa-gem"></i>
                    </span>
                    <span>Enrich</span>
                </span>
            </a>
        </li>
        <li>
            <a href="{{ url_for('portfolio.analyse') }}" class="{{ 'is-active' if request.endpoint == 'portfolio.analyse' }}">
                <span class="icon-text">
                    <span class="icon">
                        <i class="fas fa-search"></i>
                    </span>
                    <span>Analyse</span>
                </span>
            </a>
        </li>
    </ul>
    
    <p class="menu-label mt-5">
        Allocation
    </p>
    <ul class="menu-list">
        <li>
            <a href="{{ url_for('portfolio.build') }}" {% if request.endpoint == 'portfolio.build' %}class="is-active"{% endif %}>
                <span class="icon-text">
                    <span class="icon">
                        <i class="fas fa-cubes"></i>
                    </span>
                    <span>Allocation Builder</span>
                </span>
            </a>
        </li>
        <li>
            <a href="{{ url_for('main.index') }}?page=allocate" class="{{ 'is-active' if request.args.get('page') == 'allocate' }}">
                <span class="icon-text">
                    <span class="icon">
                        <i class="fas fa-coins"></i>
                    </span>
                    <span>Allocate</span>
                </span>
            </a>
        </li>
    </ul>

    <div class="mt-auto pt-6">
        {% if session.account_id %}
        <div class="has-text-centered mb-4">
            <span class="tag is-info is-medium">
                {{ session.username }}
            </span>
        </div>
        {% endif %}
    </div>
    {% else %}
    <div class="notification is-warning">
        <p class="has-text-centered">Please select an account to access navigation</p>
    </div>
    {% endif %}
    
    <div class="mt-auto pt-6">
        <div class="has-text-centered is-size-7 has-text-grey">
            <p>Portfolio Manager v1.0</p>
            <p>&copy; {{ now.year }} Nico</p>
        </div>
    </div>
</aside>
