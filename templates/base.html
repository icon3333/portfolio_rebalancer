<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio Manager{% endblock %}</title>
    
    <!-- Bulma CSS (base styles) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Bulma Tooltip Extension -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma-tooltip@3.0.2/dist/css/bulma-tooltip.min.css">
    
    <!-- Plotly.js (updated to latest version) -->
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
    
    <!-- Chart Configuration -->
    <script src="{{ url_for('static', filename='js/chart_config.js') }}"></script>
    
    <!-- Custom CSS (overrides) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}?v={{ range(1, 10000) | random }}">
    
    <!-- Bulk Edit Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bulk-edit.css') }}?v={{ range(1, 10000) | random }}">
    
    {% block head_extras %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    {% include 'components/navbar.html' %}
    
    <div class="main-wrapper" style="display: flex; min-height: calc(100vh - 3.25rem);">
        <!-- Sidebar -->
        <div class="sidebar-container" style="width: 240px; flex-shrink: 0;">
            {% include 'components/sidebar.html' %}
        </div>
        
        <!-- Main Content -->
        <div class="content-container" style="flex-grow: 1; overflow-x: hidden;">
            <main class="section">
                <div class="container">
                    <!-- Flash Messages -->
                    {% include 'components/messages.html' %}
                    
                    <!-- Page Content -->
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>
    
    <!-- Footer -->
    {% include 'components/footer.html' %}
    
    <!-- Vue.js (for components that need it) -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
    
    <!-- Axios for AJAX requests -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <!-- Main JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
